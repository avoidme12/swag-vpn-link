<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SwagVPN Redirect</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #0f0f0f; color: #00ffa3; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; text-align: center; }
        .loader { border: 4px solid #1a1a1a; border-top: 4px solid #00ffa3; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div>
        <div class="loader"></div>
        <p>Открываем SwagVPN...</p>
    </div>

    <script>
        const hash = window.location.hash.substring(1); 
    console.log("Содержимое hash:", hash);

    let key = "";

    if (hash.includes('key=')) {
        // Если ссылка формата #key=BASE64
        const urlParams = new URLSearchParams(hash);
        key = urlParams.get('key');
    } else {
        // Если ссылка формата просто #BASE64
        key = hash;
    }

    if (key && key.length > 5) {
        console.log("Ключ определен:", key);

        // Формируем Deep Link. 
        // Добавляем параметр ?key=, чтобы приложению было легче его распарсить
        const deepLink = "swagvpn://?key=" + encodeURIComponent(key);
        
        // Переход
        window.location.href = deepLink;

        // Таймер на случай, если приложение не открылось
        setTimeout(() => {
            if (!document.hidden) {
                // Показываем кнопку, если автопереход не сработал
                if (confirm("Похоже, приложение SwagVPN не установлено. Перейти к загрузке?")) {
                            window.location.href = "https://github.com/avoidme12/swag-vpn/releases";
                        }
            }
        }, 2500);
    } else {
        console.error("Ключ пустой или слишком короткий");
        document.body.innerHTML = "<p>Ошибка: Ключ не найден в URL или пуст.</p>";
    }
    </script>
</body>
</html>
